<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <div class="container">
    <h1>GOODPAY</h1>
    <h2>Payment made Simple</h2>
    <hr>
    <div class="welcome"><h3>Welcome Back</h3></div>
    <br>
    <div class="sign-in"><p>Sign in to continue</p></div>
    <form>
       <b><label for="email">Email</label></b><br><input class="text-input" type="email" id="email"> 
       <br>
       <br>
       <b><label for="password">Password</label></b><br><input class="text-input" type="password" id="password">
       <br>
       <div class="remember"> 
        <input type="checkbox" id="remeber">
        <label for="remember">Remember Me</label>
       </div>
        <br>
        <br>
        <button>Login</button>
        <br>
        <br>
        <div class="others"><a href="https://goodpay.com/forgotpassword">Forgot Password?</a>
        <hr>
        <h4>Don't have an account ?</h4>
        <a href="https://goodpay.ng/createaccount"> Create an account</a>
        </div>
    </form>
   </div>  
</body>
</html>
